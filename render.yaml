services:
  - type: web
    name: c7-workflow-diagnosis-tool
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false   # set this in the Render dashboard (secret)
